name: Publish Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: chrome-cdp-novnc

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set timestamp tag
        id: vars
        run: echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: local/${{ env.IMAGE_NAME }}:test

      - name: Start test container
        run: |
          docker run -d \
            --name chrome-cdp-test \
            -p 9600:6080 \
            -p 9601:9223 \
            -e SCREEN_WIDTH=1280 \
            -e SCREEN_HEIGHT=840 \
            --shm-size=2g \
            local/${{ env.IMAGE_NAME }}:test

      - name: Wait for container
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9601/json/version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Container did not become ready in time"
          docker logs chrome-cdp-test || true
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run environment test
        run: python3 test/test_all.py

      - name: Show container logs on failure
        if: failure()
        run: docker logs chrome-cdp-test || true

      - name: Remove test container
        if: always()
        run: docker rm -f chrome-cdp-test || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.timestamp }}
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
