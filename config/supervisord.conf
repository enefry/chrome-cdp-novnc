[unix_http_server]
file=/var/run/supervisor/supervisor.sock
chmod=0770
chown=chromeuser:chromeuser

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor/supervisor.sock

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisor/supervisord.pid
childlogdir=/var/log/supervisor

[program:xvfb]
priority=10
command=/usr/bin/Xvfb :1 -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx24
user=chromeuser
autorestart=true
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb.err

[program:fluxbox]
priority=20
command=/usr/bin/fluxbox
environment=DISPLAY=":1",HOME="/home/chromeuser"
user=chromeuser
autorestart=true
startsecs=3
stdout_logfile=/var/log/supervisor/fluxbox.log
stderr_logfile=/var/log/supervisor/fluxbox.err

[program:x11vnc]
priority=30
command=/usr/bin/x11vnc -display :1 -nopw -forever -shared -rfbport 5900
environment=HOME="/home/chromeuser"
user=chromeuser
autorestart=true
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc.err

[program:novnc]
priority=40
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080
environment=HOME="/home/chromeuser"
user=chromeuser
autorestart=true
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc.err

[program:chrome]
priority=50
command=%(ENV_CHROME_BIN)s \
    --no-sandbox \
    --disable-dev-shm-usage \
    --remote-debugging-address=0.0.0.0 \
    --remote-debugging-port=9222 \
    --user-data-dir=/data/chrome-profile \
    --no-first-run \
    --window-position=0,0 \
    --start-maximized \
    --window-size=%(ENV_SCREEN_WIDTH)s,%(ENV_SCREEN_HEIGHT)s \
    --display=:1 \
    --disable-session-crashed-bubble
environment=DISPLAY=":1",HOME="/home/chromeuser"
user=chromeuser
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/chrome.log
stderr_logfile=/var/log/supervisor/chrome.err

[program:chrome_monitor]
priority=60
command=python3 /app/scripts/chrome_monitor.py
environment=HOME="/home/chromeuser"
user=chromeuser
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/chrome_monitor.log
stderr_logfile=/var/log/supervisor/chrome_monitor.err

[program:cdp_proxy]
priority=70
command=/usr/bin/socat TCP-LISTEN:9223,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:9222
user=chromeuser
autorestart=true
startsecs=1
stdout_logfile=/var/log/supervisor/cdp_proxy.log
stderr_logfile=/var/log/supervisor/cdp_proxy.err
